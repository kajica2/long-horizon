<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" font-family="-apple-system, BlinkMacSystemFont, sans-serif">
  <!--
    BeatRender Genesis — Engine Architecture
    Stage 3 architecture diagram
  -->

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050507"/>
      <stop offset="100%" stop-color="#0a0a0e"/>
    </linearGradient>
    <linearGradient id="aurora" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#06b6d4" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.04)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.01)"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="rgba(237,237,237,0.4)"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1600" height="1000" fill="url(#bgGrad)"/>

  <!-- Subtle aurora glow -->
  <ellipse cx="800" cy="500" rx="600" ry="280" fill="url(#aurora)" opacity="0.08"/>

  <!-- Title -->
  <text x="60" y="70" fill="rgba(237,237,237,0.95)" font-size="28" font-weight="300" letter-spacing="2">BeatRender Genesis</text>
  <text x="60" y="100" fill="rgba(237,237,237,0.5)" font-size="13" letter-spacing="3">ENGINE ARCHITECTURE · STAGE 3</text>

  <line x1="60" y1="120" x2="1540" y2="120" stroke="rgba(255,255,255,0.08)"/>

  <!-- Three columns: Audio → Engine → Output -->

  <!-- Column 1: Audio Input -->
  <g transform="translate(80, 180)">
    <text fill="rgba(237,237,237,0.62)" font-size="11" letter-spacing="3">AUDIO INPUT</text>
    <rect x="0" y="20" width="280" height="200" rx="16" fill="url(#panel)" stroke="rgba(255,255,255,0.08)"/>
    <text x="20" y="60" fill="rgba(237,237,237,0.95)" font-size="14" font-weight="500">MP3 / WAV upload</text>
    <text x="20" y="85" fill="rgba(237,237,237,0.5)" font-size="11">→ ffmpeg decode</text>
    <text x="20" y="105" fill="rgba(237,237,237,0.5)" font-size="11">→ mono PCM 22050 Hz</text>

    <line x1="20" y1="125" x2="260" y2="125" stroke="rgba(255,255,255,0.06)"/>

    <text x="20" y="155" fill="rgba(237,237,237,0.95)" font-size="14" font-weight="500">essentia.js analysis</text>
    <text x="20" y="178" fill="rgba(237,237,237,0.5)" font-size="11">KeyExtractor · BeatTracker</text>
    <text x="20" y="196" fill="rgba(237,237,237,0.5)" font-size="11">SpectralCentroid · MFCC · ZCR</text>

    <!-- AudioDNA output -->
    <rect x="0" y="260" width="280" height="180" rx="16" fill="rgba(124,58,237,0.08)" stroke="rgba(124,58,237,0.3)"/>
    <text x="20" y="290" fill="rgba(237,237,237,0.95)" font-size="14" font-weight="500">AudioDNA</text>
    <text x="20" y="312" fill="rgba(237,237,237,0.5)" font-size="10">tempo · key · mode</text>
    <text x="20" y="328" fill="rgba(237,237,237,0.5)" font-size="10">brightness · warmth · texture</text>
    <text x="20" y="344" fill="rgba(237,237,237,0.5)" font-size="10">energy · aggression · complexity</text>
    <text x="20" y="360" fill="rgba(237,237,237,0.5)" font-size="10">motion · entropy</text>
    <text x="20" y="395" fill="rgba(124,58,237,0.7)" font-size="10" letter-spacing="2">10 FIELDS · [0,1]</text>
  </g>

  <!-- Arrow to engine -->
  <g>
    <line x1="380" y1="350" x2="490" y2="350" stroke="rgba(237,237,237,0.3)" stroke-width="1.5" marker-end="url(#arrow)"/>
  </g>

  <!-- Column 2: Engine (centerpiece) -->
  <g transform="translate(500, 180)">
    <text fill="rgba(237,237,237,0.62)" font-size="11" letter-spacing="3">DETERMINISTIC ENGINE</text>
    <rect x="0" y="20" width="600" height="420" rx="16" fill="url(#panel)" stroke="rgba(255,255,255,0.1)"/>

    <!-- Seed -->
    <text x="20" y="55" fill="rgba(237,237,237,0.95)" font-size="13" font-weight="500">Seed</text>
    <text x="20" y="73" fill="rgba(237,237,237,0.5)" font-size="10">32-char hex · deterministic init</text>
    <rect x="160" y="42" width="180" height="22" rx="4" fill="rgba(6,182,212,0.15)" stroke="rgba(6,182,212,0.4)"/>
    <text x="170" y="58" fill="rgba(6,182,212,0.95)" font-size="10" font-family="monospace">abc123…</text>

    <!-- AudioDNA input -->
    <text x="20" y="115" fill="rgba(237,237,237,0.95)" font-size="13" font-weight="500">ShaderGraph + AudioDNA</text>
    <text x="20" y="133" fill="rgba(237,237,237,0.5)" font-size="10">deterministic initial conditions</text>

    <!-- SimTime -->
    <text x="20" y="175" fill="rgba(237,237,237,0.95)" font-size="13" font-weight="500">simTime</text>
    <text x="20" y="193" fill="rgba(237,237,237,0.5)" font-size="10">fixedDt = 1/60s · decoupled from render FPS</text>
    <rect x="160" y="162" width="180" height="22" rx="4" fill="rgba(236,72,153,0.15)" stroke="rgba(236,72,153,0.4)"/>
    <text x="170" y="178" fill="rgba(236,72,153,0.95)" font-size="10" font-family="monospace">deterministic clock</text>

    <!-- Pipeline nodes -->
    <text x="20" y="240" fill="rgba(237,237,237,0.62)" font-size="10" letter-spacing="2">PIPELINE (per fixedDt)</text>

    <g transform="translate(20, 260)">
      <rect width="140" height="60" rx="8" fill="rgba(7,89,89,0.18)" stroke="rgba(6,182,212,0.4)"/>
      <text x="10" y="22" fill="rgba(6,182,212,0.95)" font-size="11" font-weight="500">Curl noise</text>
      <text x="10" y="38" fill="rgba(237,237,237,0.5)" font-size="9">simplex + finite-difference</text>
      <text x="10" y="50" fill="rgba(237,237,237,0.5)" font-size="9">curl-of-vector-noise</text>
    </g>

    <g transform="translate(180, 260)">
      <rect width="140" height="60" rx="8" fill="rgba(7,89,89,0.18)" stroke="rgba(6,182,212,0.4)"/>
      <text x="10" y="22" fill="rgba(6,182,212,0.95)" font-size="11" font-weight="500">Integrate</text>
      <text x="10" y="38" fill="rgba(237,237,237,0.5)" font-size="9">semi-implicit Euler</text>
      <text x="10" y="50" fill="rgba(237,237,237,0.5)" font-size="9">drag · seed respawn</text>
    </g>

    <g transform="translate(340, 260)">
      <rect width="140" height="60" rx="8" fill="rgba(7,89,89,0.18)" stroke="rgba(6,182,212,0.4)"/>
      <text x="10" y="22" fill="rgba(6,182,212,0.95)" font-size="11" font-weight="500">Render</text>
      <text x="10" y="38" fill="rgba(237,237,237,0.5)" font-size="9">additive points</text>
      <text x="10" y="50" fill="rgba(237,237,237,0.5)" font-size="9">age-based gradient</text>
    </g>

    <!-- Arrows between pipeline nodes -->
    <line x1="160" y1="290" x2="180" y2="290" stroke="rgba(237,237,237,0.3)" marker-end="url(#arrow)"/>
    <line x1="320" y1="290" x2="340" y2="290" stroke="rgba(237,237,237,0.3)" marker-end="url(#arrow)"/>

    <!-- Post FX -->
    <text x="20" y="345" fill="rgba(237,237,237,0.62)" font-size="10" letter-spacing="2">POST FX</text>
    <g transform="translate(20, 360)">
      <rect width="120" height="40" rx="6" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)"/>
      <text x="60" y="25" fill="rgba(237,237,237,0.7)" font-size="10" text-anchor="middle">Bloom</text>
    </g>
    <g transform="translate(150, 360)">
      <rect width="120" height="40" rx="6" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)"/>
      <text x="60" y="25" fill="rgba(237,237,237,0.7)" font-size="10" text-anchor="middle">Chromatic</text>
    </g>
    <g transform="translate(280, 360)">
      <rect width="120" height="40" rx="6" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)"/>
      <text x="60" y="25" fill="rgba(237,237,237,0.7)" font-size="10" text-anchor="middle">Grain</text>
    </g>
    <g transform="translate(410, 360)">
      <rect width="120" height="40" rx="6" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)"/>
      <text x="60" y="25" fill="rgba(237,237,237,0.7)" font-size="10" text-anchor="middle">Feedback</text>
    </g>

    <!-- Determinism guarantee -->
    <rect x="0" y="420" width="600" height="20" fill="rgba(124,58,237,0.05)"/>
  </g>

  <!-- Determinism callout -->
  <g transform="translate(500, 660)">
    <rect x="0" y="0" width="600" height="80" rx="12" fill="rgba(124,58,237,0.06)" stroke="rgba(124,58,237,0.3)"/>
    <text x="20" y="28" fill="rgba(124,58,237,0.95)" font-size="12" font-weight="600" letter-spacing="2">REPRODUCIBILITY CONTRACT</text>
    <text x="20" y="50" fill="rgba(237,237,237,0.85)" font-size="11">same (seed, soundtrack, shaderGraph, audioDNA) → identical state at any time t</text>
    <text x="20" y="68" fill="rgba(237,237,237,0.5)" font-size="10">on any conformant device · within float tolerance</text>
  </g>

  <!-- Arrow to output -->
  <g>
    <line x1="1115" y1="350" x2="1225" y2="350" stroke="rgba(237,237,237,0.3)" stroke-width="1.5" marker-end="url(#arrow)"/>
  </g>

  <!-- Column 3: Output -->
  <g transform="translate(1235, 180)">
    <text fill="rgba(237,237,237,0.62)" font-size="11" letter-spacing="3">OUTPUT</text>
    <rect x="0" y="20" width="285" height="200" rx="16" fill="url(#panel)" stroke="rgba(255,255,255,0.08)"/>
    <text x="20" y="55" fill="rgba(237,237,237,0.95)" font-size="13" font-weight="500">Artwork record</text>
    <text x="20" y="75" fill="rgba(237,237,237,0.5)" font-size="10">{ seed, soundtrack, shaderGraph, audioDNA }</text>
    <text x="20" y="91" fill="rgba(237,237,237,0.5)" font-size="10">stored in Prisma</text>

    <line x1="20" y1="115" x2="265" y2="115" stroke="rgba(255,255,255,0.06)"/>

    <text x="20" y="140" fill="rgba(237,237,237,0.95)" font-size="13" font-weight="500">Interactive viewer</text>
    <text x="20" y="160" fill="rgba(237,237,237,0.5)" font-size="10">/engine/[id]</text>
    <text x="20" y="178" fill="rgba(237,237,237,0.5)" font-size="10">orbit · palette · freeze</text>

    <!-- Future exports -->
    <rect x="0" y="260" width="285" height="180" rx="16" fill="rgba(245,158,11,0.04)" stroke="rgba(245,158,11,0.2)"/>
    <text x="20" y="290" fill="rgba(237,237,237,0.95)" font-size="13" font-weight="500">Future formats</text>
    <text x="20" y="312" fill="rgba(237,237,237,0.5)" font-size="10">· MP4 souvenir (Stage 8)</text>
    <text x="20" y="328" fill="rgba(237,237,237,0.5)" font-size="10">· WebM / PNG seq</text>
    <text x="20" y="344" fill="rgba(237,237,237,0.5)" font-size="10">· On-chain provenance (Stage 9+)</text>
    <text x="20" y="360" fill="rgba(237,237,237,0.5)" font-size="10">· Render farm (Phase 4)</text>
    <text x="20" y="395" fill="rgba(245,158,11,0.7)" font-size="10" letter-spacing="2">THE ARTWORK IS THE ASSET</text>
  </g>

  <!-- Bottom legend -->
  <g transform="translate(80, 880)">
    <text fill="rgba(237,237,237,0.62)" font-size="11" letter-spacing="3">REPRODUCIBILITY ANCHOR</text>
    <line x1="0" y1="20" x2="1440" y2="20" stroke="rgba(255,255,255,0.06)"/>

    <g transform="translate(0, 40)">
      <text fill="rgba(237,237,237,0.5)" font-size="11">artworkHash = sha256(seed + soundtrackHash + audioDNAHash + shaderGraphHash)</text>
      <text y="20" fill="rgba(237,237,237,0.5)" font-size="11">canonical JSON serialization — key order independent</text>
      <text y="40" fill="rgba(237,237,237,0.5)" font-size="11">audio reactivity modulates params; never computes state — same PCM at same simTime → same evolution</text>
    </g>
  </g>
</svg>